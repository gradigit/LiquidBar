name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftpm:
    name: SwiftPM Tests
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Checkout
        # actions/checkout v7, pinned to a reviewed commit for CI supply-chain stability.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Test
        run: swift test -c debug
