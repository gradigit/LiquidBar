name: LiquidBar

options:
  bundleIdPrefix: com.liquidbar
  deploymentTarget:
    macOS: "26.0"

settings:
  base:
    SWIFT_VERSION: 6.2
    MACOSX_DEPLOYMENT_TARGET: "26.0"

targets:
  LiquidBar:
    type: application
    platform: macOS
    sources:
      - path: Sources/LiquidBar
        excludes:
          - Resources/**
      - path: Sources/LiquidBar/Resources
        buildPhase: resources
      - path: Assets/AppIcon/LiquidBar.icns
        buildPhase: resources
      - path: Assets/MenuBar/liquidbar-menubar-template.png
        buildPhase: resources
      - path: Assets/Brand/liquidbar-brand-bar-transparent.png
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liquidbar.testhost
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: LiquidBar
        INFOPLIST_KEY_CFBundleIconFile: LiquidBar
        INFOPLIST_KEY_NSScreenCaptureUsageDescription: LiquidBar uses Screen Recording permission to capture static window thumbnails for taskbar previews and the window switcher.
        ENABLE_TESTABILITY: true

  LiquidBarFixture:
    type: application
    platform: macOS
    sources:
      - path: LiquidBarFixtureApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liquidbar.fixture
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: LiquidBarFixture
        ENABLE_TESTABILITY: true

  LiquidBarUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: UITests
    dependencies:
      - target: LiquidBar
      - target: LiquidBarFixture
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liquidbar.uitests
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: LiquidBarUITests

schemes:
  LiquidBarE2E:
    build:
      targets:
        LiquidBar: all
        LiquidBarFixture: all
    test:
      targets:
        - name: LiquidBarUITests
          randomExecutionOrder: true
      gatherCoverageData: false
